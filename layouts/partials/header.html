<header class="site-header">
  <div class="site-header-inner">
    <a class="site-identity" href="{{ .Site.BaseURL | relLangURL }}" aria-label="Varyvoda home">
      <span class="identity-mark">IV</span>
      <span class="identity-divider" aria-hidden="true">/</span>
      <span>Varyvoda</span>
    </a>

    <details class="site-navigation">
      <summary class="menu-button">
        <span class="menu-label">Menu</span><span aria-hidden="true">+</span>
      </summary>
    <nav class="primary-navigation" id="primary-navigation" aria-label="Main navigation">
      <a href="/projects/"{{ if eq .Section "projects" }} aria-current="page"{{ end }}>Work</a>
      <a href="/posts/"{{ if eq .Section "posts" }} aria-current="page"{{ end }}>Writing</a>
      <a href="/about/"{{ if eq .RelPermalink "/about/" }} aria-current="page"{{ end }}>About</a>
      <a href="/contact/"{{ if eq .RelPermalink "/contact/" }} aria-current="page"{{ end }}>Contact</a>
    </nav>
    </details>
  </div>
</header>
