<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.58" stop-color="#0b1320"/>
      <stop offset="1" stop-color="#10151e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66d9ef"/>
      <stop offset="0.58" stop-color="#a6e3a1"/>
      <stop offset="1" stop-color="#f9c97a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>
  <circle cx="1018" cy="80" r="240" fill="#66d9ef" opacity="0.08"/>
  <circle cx="106" cy="554" r="260" fill="#a6e3a1" opacity="0.06"/>

  <g transform="translate(760 112)">
    <rect x="0" y="0" width="300" height="328" rx="18" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.12)"/>
    <path d="M 34 276 C 74 263, 98 250, 128 226 C 166 196, 178 166, 206 132 C 226 108, 246 88, 266 62" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <g fill="#0b1320" stroke="#66d9ef" stroke-width="4">
      <circle cx="34" cy="276" r="10"/>
      <circle cx="128" cy="226" r="10"/>
      <circle cx="206" cy="132" r="10"/>
      <circle cx="266" cy="62" r="10" stroke="#a6e3a1"/>
    </g>
    <g fill="#94a6b4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
      <text x="32" y="310">Dec</text>
      <text x="140" y="310">Apr</text>
      <text x="242" y="310">Jul</text>
    </g>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="86" y="98" fill="#66d9ef" font-size="24" font-weight="700" letter-spacing="4">CASE STUDY</text>
    <text x="82" y="198" fill="#f4fbff" font-size="86" font-weight="800">Sirv AI Studio</text>
    <text x="86" y="258" fill="#c9d5df" font-size="32" font-weight="500">An AI product-content platform for e-commerce.</text>
    <text x="86" y="306" fill="#94a6b4" font-size="26">Built from first commit to production: tools, workflows,</text>
    <text x="86" y="342" fill="#94a6b4" font-size="26">supplier intake, safe Shopify publishing, MCP, billing,</text>
    <text x="86" y="378" fill="#94a6b4" font-size="26">and the infrastructure underneath.</text>

    <g transform="translate(86 442)">
      <rect x="0" y="0" width="214" height="86" rx="12" fill="rgba(102,217,239,0.08)" stroke="rgba(102,217,239,0.32)"/>
      <text x="24" y="39" fill="#edf7fb" font-size="34" font-weight="800">5,500</text>
      <text x="24" y="65" fill="#94a6b4" font-size="18" font-weight="700">commits by me</text>

      <rect x="238" y="0" width="214" height="86" rx="12" fill="rgba(166,227,161,0.08)" stroke="rgba(166,227,161,0.28)"/>
      <text x="262" y="39" fill="#edf7fb" font-size="34" font-weight="800">254</text>
      <text x="262" y="65" fill="#94a6b4" font-size="18" font-weight="700">migrations</text>

      <rect x="476" y="0" width="214" height="86" rx="12" fill="rgba(249,201,122,0.08)" stroke="rgba(249,201,122,0.3)"/>
      <text x="500" y="39" fill="#edf7fb" font-size="34" font-weight="800">45</text>
      <text x="500" y="65" fill="#94a6b4" font-size="18" font-weight="700">MCP tools</text>
    </g>

    <text x="86" y="576" fill="#7d8996" font-size="20" font-weight="700">Igor Varyvoda · varyvoda.com</text>
  </g>
